<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- Onclick Popunder — Zone 10676322 -->
<script>
  (function(s){
    s.dataset.zone='10676322';
    s.src='https://al5sm.com/tag.min.js';
  })(
    [document.documentElement, document.body]
      .filter(Boolean).pop()
      .appendChild(document.createElement('script'))
  );
</script>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  #close-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    background: rgba(255,255,255,0.85);
    color: #000;
    border: 1.5px solid #000;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    display: none;
    line-height: 21px;
    text-align: center;
    padding: 0;
  }
</style>
</head>
<body>

<button id="close-btn" onclick="closeAd()">✕</button>

<script>
  // Tell ArkTS to close this overlay
  function closeAd() {
    try {
      window.NexTubeAd.onAdClosed();
    } catch(e) {}
  }

  // Show close button after 10 seconds
  setTimeout(function() {
    document.getElementById('close-btn').style.display = 'block';
  }, 10000);

  // Auto-close after 30 seconds as safety net
  setTimeout(function() { closeAd(); }, 30000);

  // Expose trigger function — ArkTS calls this via runJavaScript()
  // after onPageEnd fires, ensuring the Onclick script is fully
  // loaded before the synthetic click is dispatched
  function triggerAd() {
    document.dispatchEvent(new MouseEvent('click', {
      bubbles: true,
      cancelable: true,
      view: window
    }));
  }
</script>

</body>
</html>
